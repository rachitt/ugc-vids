name: CI

on:
  pull_request:
    branches:
      - main
      - staging
      - "feature/**"
  push:
    branches:
      - main
      - staging
      - "feature/**"

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fastlane
          POSTGRES_PASSWORD: fastlane
          POSTGRES_USER: fastlane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fastlane -d fastlane"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://fastlane:fastlane@localhost:5432/fastlane
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ci-only-replace-with-real-secret-before-deploy
      FASTLANE_DEFAULT_WORKSPACE_NAME: CI E2E Workspace
      FASTLANE_FAKE_AI: "1"
      FASTLANE_FAKE_SCRAPE: "1"
      STORAGE_DRIVER: local

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm db:migrate
      - run: pnpm test:e2e
