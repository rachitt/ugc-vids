name: fastlane

services:
  postgres:
    image: postgres:16-alpine
    container_name: fastlane-postgres
    environment:
      POSTGRES_DB: fastlane
      POSTGRES_PASSWORD: fastlane
      POSTGRES_USER: fastlane
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastlane -d fastlane"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fastlane-redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
